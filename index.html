<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>ระบบสแกนเข้า–ออกพื้นที่</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="description" content="ระบบสแกน QR, Auto ID และบัตร SKDC เพื่อบันทึกเข้า–ออกพื้นที่" />

  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#00BFB2">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="preconnect" href="https://visitor-entry-api.somchaibutphon.workers.dev" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script defer src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script defer src="https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js"></script>

  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="page-shell">
    <section class="container" aria-labelledby="pageTitle">
      <h1 id="pageTitle">บันทึกเข้า–ออกพื้นที่</h1>
      <p class="subtitle">สแกน QR, Auto ID หรือบัตร SKDC</p>

      <div id="videoWrap" class="video-wrap">
        <video
          id="qrVideo"
          autoplay
          muted
          playsinline
          webkit-playsinline
          aria-label="ภาพจากกล้องสำหรับสแกน QR Code"
        ></video>

        <div id="cameraStatus" class="camera-status" data-state="idle" aria-live="polite">
          กล้องปิดอยู่
        </div>

        <section
          id="scanResult"
          class="result-card is-hidden"
          aria-live="polite"
          aria-label="ผลการสแกน"
        >
          <div class="result-top">
            <div>
              <div class="result-title" id="resultTitle">ผลการสแกน</div>
              <div id="resultActionBadge" class="result-action-badge is-hidden"></div>
              <div class="result-sub" id="resultHint">พร้อมสแกน...</div>
              <div class="result-auto-note">กลับไปสแกนต่ออัตโนมัติใน 3 วินาที</div>
            </div>
          </div>

          <div id="resultMedia" class="result-media is-hidden"></div>
          <div class="result-grid" id="resultGrid"></div>
        </section>
      </div>

      <div class="field-group">
        <input
          type="text"
          id="searchInput"
          placeholder="ป้อน Auto ID หรือ ID Card"
          autocomplete="off"
          autocapitalize="characters"
          spellcheck="false"
          inputmode="text"
          aria-label="Auto ID หรือ ID Card"
          maxlength="120"
        />
        <button id="searchBtn" class="primary-btn" type="button">ตรวจสอบและบันทึก</button>
      </div>

      <select id="cameraSelect" aria-label="เลือกกล้อง"></select>

      <div class="button-container">
        <button id="startCamera" class="secondary-btn" type="button">เปิดกล้อง</button>
        <button id="stopCamera" class="danger-btn" type="button">ปิดกล้อง</button>
      </div>
    </section>
  </main>

  <footer class="marquee-container" aria-label="ข้อมูลผู้พัฒนา">
    <div class="marquee-track">© สร้างและพัฒนาโดย S&amp;LP สามโคก</div>
  </footer>

  <script defer src="./app.js"></script>
</body>
</html>
